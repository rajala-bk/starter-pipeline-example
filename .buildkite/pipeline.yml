steps:
  - label: "My Test"
    if: build.env("TEST_VAR_CUSTOM") == null
    command:
      - "python3 ./src/run.py"
    agents:
      - "fixture=${MY_FIXTURE}"
      - "queue=question"
    artifact_paths:
      - "_files/*"

