steps:
  - label: "My Test"
    if: build.env("TEST_VAR_CUSTOM") == null
    command:
      - "poetry install"
      - "poetry run python ./src/run.py --use-env-vars"
    agents:
      - "fixture=${MY_FIXTURE}"
      - "queue=testqueue"
    artifact_paths:
      - "_files/*"