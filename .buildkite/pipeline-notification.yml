steps:
  - label: ":docker: configure image tag"
    key: tag:create
    command: |
      TAG=$(echo "newtag")
      buildkite-agent meta-data set "TAG" "$$TAG"
      buildkite-agent step update "label" ":sunglasses: TAG=$$TAG}"
