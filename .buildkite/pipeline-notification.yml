steps:
  - label: ":mag: Test Annotation"
    command: |
      node -e "process.emitWarning('This API is deprecated', 'DeprecationWarning')" 2>&1 | tee build.log

      DEPRECATIONS=$(grep -i "deprecat" build.log | sort -u)

      if [ -n "$DEPRECATIONS" ]; then
        echo "$DEPRECATIONS" | buildkite-agent annotate \
          --style "warning" \
          --context "deprecations" \
          --append
      else
        buildkite-agent annotate "No deprecation warnings found :white_check_mark:" \
          --style "success" \
          --context "deprecations"
      fi
    plugins:
      - docker#v5.9.0:
          image: "node:18"
    agents:
      queue: "testqueue"