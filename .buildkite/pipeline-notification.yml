steps:
  - label: ":docker: configure image tag"
    key: tag:create
    command:
      - TAG="v1.0.0-test"
      - buildkite-agent meta-data set "TAG" "$TAG"
      - buildkite-agent step update "tag:create" "label: \":sunglasses: TAG=${TAG}\""
